<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BMTM — Match Tool</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #080808; --white: #f0ece3; --red: #e8291a; --surface: #111; --border: #1e1e1e; --mid: #484848; --dim: #2c2c2c; }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; padding: 40px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--red); margin-bottom: 8px; }
    p.sub { font-size: 12px; color: var(--mid); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 32px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .col h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .col h2 span { font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--mid); font-weight: 300; margin-left: 8px; }
    .search { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 13px; outline: none; margin-bottom: 12px; }
    .search:focus { border-color: var(--red); }
    .list { height: 600px; overflow-y: auto; border: 1px solid var(--border); }
    .item { padding: 10px 14px; border-bottom: 1px solid #151515; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
    .item:hover { background: #141414; }
    .item.selected { background: #1a0a08; border-left: 3px solid var(--red); }
    .item.matched { opacity: 0.4; }
    .item img { width: 60px; height: 34px; object-fit: cover; flex-shrink: 0; background: var(--dim); }
    .item-text { flex: 1; min-width: 0; }
    .item-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-sub { font-size: 10px; color: var(--mid); margin-top: 2px; }
    .match-badge { font-size: 9px; background: var(--red); color: white; padding: 2px 6px; letter-spacing: 0.1em; flex-shrink: 0; }
    .auto-badge { font-size: 9px; background: #1a4a1a; color: #4caf50; padding: 2px 6px; letter-spacing: 0.1em; flex-shrink: 0; }
    .actions { margin: 20px 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 18px; border: none; cursor: pointer; transition: all 0.15s; text-decoration: none; }
    .btn-red { background: var(--red); color: white; }
    .btn-red:hover { background: #c01f12; }
    .btn-dim { background: var(--dim); color: #aaa; }
    .btn-dim:hover { background: #3a3a3a; color: white; }
    .btn-green { background: #1a4a1a; color: #4caf50; }
    .btn-green:hover { background: #1e5a1e; }
    .status { font-size: 12px; color: var(--mid); }
    .selection-info { background: var(--surface); border: 1px solid var(--border); padding: 16px 20px; margin: 16px 0; display: none; }
    .selection-info.visible { display: block; }
    .selection-info h3 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; margin-bottom: 4px; }
    .selection-info p { font-size: 12px; color: var(--mid); }
    .matches-section { margin-top: 32px; }
    .matches-section h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .match-row { display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px solid #151515; }
    .match-row .yt { font-size: 12px; }
    .match-row .pc { font-size: 12px; color: var(--mid); }
    .match-row .arrow { color: var(--red); font-size: 16px; }
    .match-row .unmatch { background: none; border: 1px solid #333; color: #666; font-size: 10px; padding: 3px 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .match-row .unmatch:hover { border-color: var(--red); color: var(--red); }
    .export-area { margin-top: 24px; }
    textarea { width: 100%; height: 200px; background: var(--surface); border: 1px solid var(--border); color: #4caf50; font-family: monospace; font-size: 11px; padding: 12px; outline: none; resize: vertical; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-msg { display: flex; align-items: center; gap: 12px; color: var(--mid); font-size: 13px; }
  </style>
</head>
<body>

<h1>BMTM Match Tool</h1>
<p class="sub">Match YouTube videos to pCloud tracks</p>

<div id="loading-state" class="loading-msg">
  <div class="spinner"></div>
  <span id="loading-text">Loading YouTube videos...</span>
</div>

<div id="main" style="display:none">
  <div class="actions">
    <button class="btn btn-green" onclick="autoMatch()">⚡ Auto-Match All</button>
    <button class="btn btn-dim" onclick="toggleMatched()">Toggle Matched</button>
    <span class="status" id="status-text"></span>
  </div>

  <div class="selection-info" id="selection-info">
    <h3 id="sel-title"></h3>
    <p id="sel-sub"></p>
  </div>

  <div class="cols">
    <div class="col">
      <h2>YouTube Videos <span id="yt-count"></span></h2>
      <input type="search" class="search" id="yt-search" placeholder="Search YouTube videos..." oninput="renderYT()">
      <div class="list" id="yt-list"></div>
    </div>
    <div class="col">
      <h2>pCloud Tracks <span id="pc-count"></span></h2>
      <input type="search" class="search" id="pc-search" placeholder="Search pCloud tracks..." oninput="renderPC()">
      <div class="list" id="pc-list"></div>
    </div>
  </div>

  <div class="actions" style="margin-top:16px">
    <button class="btn btn-red" id="link-btn" onclick="linkSelected()" disabled>Link Selected Pair</button>
    <button class="btn btn-dim" onclick="clearSelection()">Clear Selection</button>
  </div>

  <div class="matches-section">
    <h2>Manual Matches <span id="manual-count" style="font-size:14px;font-family:'DM Sans';color:var(--mid);font-weight:300"></span></h2>
    <div id="matches-list"></div>
  </div>

  <div class="export-area">
    <div class="actions">
      <button class="btn btn-green" onclick="exportJS()">Export pcloud_tracks.js</button>
      <button class="btn btn-dim" onclick="copyExport()">Copy to Clipboard</button>
    </div>
    <textarea id="export-out" placeholder="Click 'Export' to generate updated pcloud_tracks.js..."></textarea>
  </div>
</div>

<script src="pcloud_tracks.js"></script>
<script>
const API_KEY = 'AIzaSyDFHVpiLCTIhK4TbuboqMsBgX1HKlfzKII';
const CHANNEL_ID = 'UCPKTxRDHuASamyHSRM6XCNg';

let allVideos = [];
let manualMatches = {}; // ytVideoId -> pcloud track index
let selectedYT = null;
let selectedPC = null;
let showMatched = false;

function normalize(str) {
  return str.toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ').trim();
}

function autoMatchScore(ytTitle, pcDisplay) {
  const yt = normalize(ytTitle);
  const pc = normalize(pcDisplay);
  if (yt === pc) return 100;
  if (yt.includes(pc) || pc.includes(yt)) return 80;
  const ytWords = yt.split(' ');
  const pcWords = pc.split(' ');
  const shared = ytWords.filter(w => w.length > 3 && pcWords.includes(w));
  const score = (shared.length / Math.max(ytWords.length, pcWords.length)) * 60;
  return score;
}

function getAutoMatches() {
  const matches = {};
  allVideos.forEach(v => {
    let best = null, bestScore = 0;
    PCLOUD_TRACKS.forEach((t, i) => {
      const score = autoMatchScore(v.snippet.title, t.display);
      if (score > bestScore && score >= 50) {
        bestScore = score;
        best = i;
      }
    });
    if (best !== null) matches[v.id.videoId] = best;
  });
  return matches;
}

let autoMatches = {};

function isMatched(ytId) {
  return manualMatches[ytId] !== undefined || autoMatches[ytId] !== undefined;
}

function isPCMatched(pcIndex) {
  return Object.values(manualMatches).includes(pcIndex) ||
         Object.values(autoMatches).includes(pcIndex);
}

function renderYT() {
  const q = document.getElementById('yt-search').value.toLowerCase();
  const list = document.getElementById('yt-list');
  list.innerHTML = '';
  let count = 0;
  allVideos.forEach(v => {
    if (!showMatched && isMatched(v.id.videoId) && v.id.videoId !== selectedYT) return;
    if (q && !v.snippet.title.toLowerCase().includes(q)) return;
    count++;
    const div = document.createElement('div');
    div.className = 'item' + (isMatched(v.id.videoId) ? ' matched' : '') + (selectedYT === v.id.videoId ? ' selected' : '');
    const isAuto = autoMatches[v.id.videoId] !== undefined;
    const isManual = manualMatches[v.id.videoId] !== undefined;
    div.innerHTML = `
      <img src="https://img.youtube.com/vi/${v.id.videoId}/default.jpg">
      <div class="item-text">
        <div class="item-title">${v.snippet.title}</div>
        <div class="item-sub">${new Date(v.snippet.publishedAt).getFullYear()}</div>
      </div>
      ${isManual ? '<span class="match-badge">MANUAL</span>' : ''}
      ${isAuto && !isManual ? '<span class="auto-badge">AUTO</span>' : ''}`;
    div.onclick = () => selectYT(v.id.videoId, v.snippet.title);
    list.appendChild(div);
  });
  document.getElementById('yt-count').textContent = `(${count} shown)`;
}

function renderPC() {
  const q = document.getElementById('pc-search').value.toLowerCase();
  const list = document.getElementById('pc-list');
  list.innerHTML = '';
  let count = 0;
  PCLOUD_TRACKS.forEach((t, i) => {
    if (!showMatched && isPCMatched(i) && i !== selectedPC) return;
    if (q && !t.display.toLowerCase().includes(q)) return;
    count++;
    const div = document.createElement('div');
    div.className = 'item' + (isPCMatched(i) ? ' matched' : '') + (selectedPC === i ? ' selected' : '');
    const isManual = Object.values(manualMatches).includes(i);
    const isAuto = Object.values(autoMatches).includes(i) && !isManual;
    div.innerHTML = `
      <div class="item-text">
        <div class="item-title">${t.display}</div>
        <div class="item-sub">${t.folder} · ${t.year}</div>
      </div>
      ${isManual ? '<span class="match-badge">MANUAL</span>' : ''}
      ${isAuto ? '<span class="auto-badge">AUTO</span>' : ''}`;
    div.onclick = () => selectPC(i, t.display);
    list.appendChild(div);
  });
  document.getElementById('pc-count').textContent = `(${count} shown)`;
}

function selectYT(id, title) {
  selectedYT = id;
  updateSelectionInfo();
  renderYT();
  checkLinkBtn();
}

function selectPC(i, title) {
  selectedPC = i;
  updateSelectionInfo();
  renderPC();
  checkLinkBtn();
}

function updateSelectionInfo() {
  const info = document.getElementById('selection-info');
  const ytTitle = selectedYT ? allVideos.find(v => v.id.videoId === selectedYT)?.snippet.title : null;
  const pcTitle = selectedPC !== null ? PCLOUD_TRACKS[selectedPC]?.display : null;
  if (ytTitle || pcTitle) {
    info.classList.add('visible');
    document.getElementById('sel-title').textContent = ytTitle && pcTitle
      ? `${ytTitle} ↔ ${pcTitle}`
      : ytTitle || pcTitle;
    document.getElementById('sel-sub').textContent = ytTitle && pcTitle
      ? 'Ready to link — click "Link Selected Pair"'
      : 'Select one from each column to link them';
  } else {
    info.classList.remove('visible');
  }
}

function checkLinkBtn() {
  document.getElementById('link-btn').disabled = !(selectedYT && selectedPC !== null);
}

function linkSelected() {
  if (!selectedYT || selectedPC === null) return;
  manualMatches[selectedYT] = selectedPC;
  // Remove from auto if it was there
  delete autoMatches[selectedYT];
  selectedYT = null;
  selectedPC = null;
  document.getElementById('selection-info').classList.remove('visible');
  document.getElementById('link-btn').disabled = true;
  renderYT();
  renderPC();
  renderMatches();
  updateStatus();
}

function renderMatches() {
  const list = document.getElementById('matches-list');
  list.innerHTML = '';
  const entries = Object.entries(manualMatches);
  document.getElementById('manual-count').textContent = `(${entries.length})`;
  entries.forEach(([ytId, pcIndex]) => {
    const vid = allVideos.find(v => v.id.videoId === ytId);
    const track = PCLOUD_TRACKS[pcIndex];
    if (!vid || !track) return;
    const row = document.createElement('div');
    row.className = 'match-row';
    row.innerHTML = `
      <div class="yt">${vid.snippet.title}</div>
      <div class="arrow">↔</div>
      <div class="pc">${track.display}</div>
      <button class="unmatch" onclick="unmatch('${ytId}')">✕</button>`;
    list.appendChild(row);
  });
}

function unmatch(ytId) {
  delete manualMatches[ytId];
  renderMatches();
  renderYT();
  renderPC();
  updateStatus();
}

function autoMatch() {
  autoMatches = getAutoMatches();
  updateStatus();
  renderYT();
  renderPC();
}

function toggleMatched() {
  showMatched = !showMatched;
  renderYT();
  renderPC();
}

function clearSelection() {
  selectedYT = null;
  selectedPC = null;
  document.getElementById('selection-info').classList.remove('visible');
  document.getElementById('link-btn').disabled = true;
  renderYT();
  renderPC();
}

function updateStatus() {
  const totalAuto = Object.keys(autoMatches).length;
  const totalManual = Object.keys(manualMatches).length;
  const unmatched = allVideos.filter(v => !isMatched(v.id.videoId)).length;
  document.getElementById('status-text').textContent =
    `${totalAuto} auto + ${totalManual} manual matches · ${unmatched} YouTube videos unmatched`;
}

function exportJS() {
  // Merge auto and manual matches, manual takes priority
  const allMatches = { ...autoMatches, ...manualMatches };

  // Build updated PCLOUD_TRACKS with ytVideoId added
  const updated = PCLOUD_TRACKS.map((t, i) => {
    // Find YT video matched to this pCloud index
    const ytId = Object.entries(allMatches).find(([vid, pcIdx]) => pcIdx === i)?.[0] || null;
    return { ...t, ytVideoId: ytId };
  });

  const lines = ['const PCLOUD_TRACKS = ['];
  updated.forEach(t => {
    const display = t.display.replace(/'/g, "\\'");
    const folder = t.folder.replace(/'/g, "\\'");
    const file = t.file.replace(/'/g, "\\'");
    const yt = t.ytVideoId ? `'${t.ytVideoId}'` : 'null';
    lines.push(`  { display: '${display}', folder: '${folder}', file: '${file}', year: '${t.year}', yt: ${yt} },`);
  });
  lines.push('];');

  document.getElementById('export-out').value = lines.join('\n');
}

function copyExport() {
  const ta = document.getElementById('export-out');
  if (!ta.value) { exportJS(); }
  ta.select();
  document.execCommand('copy');
  alert('Copied to clipboard!');
}

async function fetchAllVideos() {
  let videos = [];
  let pageToken = '';
  do {
    const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet&type=video&order=date&maxResults=50${pageToken ? '&pageToken=' + pageToken : ''}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    videos = videos.concat(data.items || []);
    pageToken = data.nextPageToken || '';
    document.getElementById('loading-text').textContent = `Loading YouTube videos... (${videos.length} so far)`;
  } while (pageToken);
  return videos;
}

async function init() {
  try {
    allVideos = await fetchAllVideos();
    autoMatches = getAutoMatches();
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    updateStatus();
    renderYT();
    renderPC();
  } catch(e) {
    document.getElementById('loading-text').textContent = 'Error: ' + e.message;
  }
}

init();
</script>
</body>
</html>
